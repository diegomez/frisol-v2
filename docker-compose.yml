services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: frisol
      MYSQL_USER: frisol
      MYSQL_PASSWORD: frisol
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'frisol', '-pfrisol']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: "mysql://frisol:frisol@db:3306/frisol"
      JWT_SECRET: "frisol-v2-secret-change-in-production"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    volumes:
      - uploads:/app/uploads
    command: node server.js

volumes:
  mysql_data:
  uploads:
